{% extends "base.html" %}

{% block title %}Login | Congressional Trade Tracker{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Login</h1>
    <p>Access your trade disclosure dashboard.</p>

    <form method="POST">
        <div class="form-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>

        <br>

        <div class="form-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-actions">
            <button type="submit">Login</button>
            <a class="button secondary" href="{{ url_for('register') }}">Register</a>
        </div>
    </form>
</div>
{% endblock %}
